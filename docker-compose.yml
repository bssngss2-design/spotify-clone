services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotify
      POSTGRES_PASSWORD: spotify
      POSTGRES_DB: spotify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://spotify:spotify@db:5432/spotify
      JWT_SECRET: spotify-clone-secret-key-change-in-prod
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: .
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000

volumes:
  pgdata:
